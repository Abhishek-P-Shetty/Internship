<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms
    
    </title>
</head>
<body>
    <forms>
        <label for="name">Name:</label>
        <input type="text" placeholder="Enter your name" id="name" name="name" required><br><br>
        <!-- Email input field -->
        <label for="email">Email:</label>
        <input type="email" placeholder="Enter your email" id="email" name="email" required><br><br>
        <!-- Password input field -->
        <label for="password">Password:</label>
        <input type="password" placeholder="Enter your password" id="password" name="password" minlength="6" maxlength="100" required><br><br>
        <!-- Number input field -->
        <label for="age">Age:</label>
        <input type="number" placeholder="Enter your age" id="age" name="age" min="12" max="24" required><br><br>
        <!-- radio buttons -->
        <p>Gender:</p>
        <label for="male">Male</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="female">Female</label>
        <input type="radio" id="female" name="gender" value="female"><br><br>
        <p>Skills:</p>
        <input type="checkbox" id="html" name="skills" value="HTML">
        <label for="html">HTML</label>
        <input type="checkbox" id="css" name="skills" value="CSS">
        <label for="css">CSS</label>
        <input type="checkbox" id="javascript" name="skills" value="JavaScript">
        <label for="javascript">JavaScript</label><br><br>
        <p>Country:</p>
        <select id="country" name="country" required>
            <option value="">Select a country</option>
            <option value="usa">United States</option>
            <option value="ca">India</option>
            <option value="uk">United Kingdom</option>
        </select><br><br>
        
        <label for="message">Message:</label><br><br>
        <textarea id="message" name="message" rows="4" cols="50" placeholder="Enter your message here"></textarea><br><br>
        <label for="date">Upload a file:</label>
        <input type="date" id="date" name="date" required><br><br>
        
        <!-- Submit button -->
        <button type="submit" >Submit</button>
        <button type="reset">Reset</button>

    </forms>
</body>
</html>
